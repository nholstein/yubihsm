name: Go

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['master']

jobs:
  build:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@v5'

      - name: 'Set up Go'
        uses: 'actions/setup-go@v6'
        with:
          go-version: 'stable'

      - name: 'Test'
        run: 'go test -cover -race ./...'

      - name: 'Lint'
        uses: 'golangci/golangci-lint-action@v9'
        with:
          version: 'v2.10.1'
          skip-cache: true
